<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles/main.css">
  <title>Currency convert</title>
</head>
<body>

  <h1>Currency Converter</h1>

  <div class="container">

    <div class="currency_box">
      <label for="amount">amount</label>
      <input id="amount" type="text">
    </div>

    <div class="currency_box">
      <label for="from">from</label>
      <select name="from" id="from"></select> 
    </div>

    <button id="swap" type="button">
      <i class="fa-solid fa-money-bill-transfer"></i>
    </button>

    <div class="currency_box">
      <label for="to">to</label>
      <select name="to" id="to"></select> 
    </div>

    <div class="box_button">
      <button id="convert" type="button">
        <i class="fa-solid fa-arrows-rotate"></i>
      </button>
    </div>

  </div>

  <h2>Exchange result</h2>

  <p id="error"></p>
  <div>Converted amount: <span></span></div>
  <div>Amount to convert  <span>1,00</span></div>


  <div>To: <span></span></div>
  <div>Converted amount <span id="result">1,00</span></div>

  <script type="module" src="./dist/app.js"></script>
</body>
</html>
