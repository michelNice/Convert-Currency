<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="styles/main.css">

  <title>Currency Converter</title>
</head>
<body>

<div class="container_currency">

  <h1>Currency Converter</h1>

  <div class="container">

    <div class="currency_box">
      <label for="amount">Amount</label>
      <input id="amount" type="text" placeholder="0.00">
    </div>

    <div class="currency_box">
      <label for="from">From</label>
      <select id="from"></select> 
    </div>

    <button id="swap" type="button">
      <i class="fa-solid fa-right-left"></i>
    </button>

    <div class="currency_box">
      <label for="to">To</label>
      <select id="to"></select> 
    </div>

    <div class="box_button">
      <button id="convert" type="button">
        <i class="fa-solid fa-arrows-rotate"></i>
      </button>
    </div>

  </div>

  <h2>Exchange result</h2>

  <!-- 🔥 espaço fixo pro erro -->
  <div id="error"></div>

  <div class="box_result">

    <div class="box_item">
      <div>From: <span id="fromText"></span></div>
      <div>Original amount: <span id="amountText">0,00</span></div>
    </div>

    <div class="box_item">
      <div>To: <span id="toText"></span></div>
      <div>Result: <span id="result">0,00</span></div>
    </div>

  </div>

</div>

<script type="module" src="./dist/app.js"></script>
</body>
</html>
